<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Haven</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
  <div class="auth-split">
    <div class="auth-left">
      <a href="index.html" class="auth-brand"><i class="fas fa-book-open"></i> <em>Book Haven</em></a>
      <h2>"A reader lives a thousand lives before he dies."</h2>
      <p>— George R.R. Martin</p>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="auth-sub">Sign in to your account</p>
        <div id="authMsg" class="auth-msg" style="display:none"></div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap"><i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="you@example.com"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap"><i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="••••••••"/>
          </div>
        </div>
        <button class="btn-fill full-btn" onclick="login()">Sign In <i class="fas fa-arrow-right"></i></button>
        <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
        <div class="demo-hint">
          <strong>Demo:</strong> admin@library.com / admin123<br>
          Or register a new user account
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
