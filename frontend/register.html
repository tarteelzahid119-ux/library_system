<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Haven</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
  <div class="auth-split">
    <div class="auth-left">
      <a href="index.html" class="auth-brand"><i class="fas fa-book-open"></i> <em>Book Haven</em></a>
      <h2>"Not all those who wander are lost."</h2>
      <p>— J.R.R. Tolkien</p>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <h1>Create Account</h1>
        <p class="auth-sub">Join the  community</p>
        <div id="authMsg" class="auth-msg" style="display:none"></div>
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrap"><i class="fas fa-user"></i>
            <input type="text" id="regName" placeholder="Your full name"/>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrap"><i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="you@example.com"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap"><i class="fas fa-lock"></i>
            <input type="password" id="regPassword" placeholder="Min 6 characters"/>
          </div>
        </div>
        <button class="btn-fill full-btn" onclick="register()">Create Account <i class="fas fa-arrow-right"></i></button>
        <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
